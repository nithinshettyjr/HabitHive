services:
  # ── Backend API (Express + TypeScript) ───────────────────────────────────────
  - type: web
    name: habithive-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      # PORT is NOT set here — Render injects it automatically
      - key: MONGODB_URI
        sync: false   # Set this manually in Render dashboard (contains password)
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: CLIENT_URL
        value: https://habit-hive-one.vercel.app
    healthCheckPath: /api/health
    autoDeploy: true
